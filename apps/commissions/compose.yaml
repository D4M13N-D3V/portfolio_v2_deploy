# Commissions app demo — Next.js UI + .NET 8 core API, on the shared Postgres.
#
# The core-api runs its EF Core migrations on startup (the standalone migrator
# project is a no-op stub), so the schema is created automatically.
#
# Auth0 is required for login. The Auth0 application must whitelist the deployed
# callback/logout/web-origin URLs — see .env.example.

services:
  commissions-core-api:
    image: ${COMMISSIONS_API_IMAGE:-ghcr.io/d4m13n-d3v/comissions-app-core-api:latest}
    platform: linux/amd64
    restart: unless-stopped
    profiles: [commissions]
    depends_on:
      pg:
        condition: service_healthy
      pg-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # Database (note: the API binds the lowercase keys username/password)
      Database__Host: pg
      Database__Port: "5432"
      Database__Database: ${COMMISSIONS_DB_NAME:-comissionsapp}
      Database__username: ${COMMISSIONS_DB_USER:-comissions}
      Database__password: ${COMMISSIONS_DB_PASSWORD:-comissions}
      Database__RunMigrationsOnStartup: "true"
      # Auth0
      Auth0__Domain: ${COMMISSIONS_AUTH0_DOMAIN}
      Auth0__Audience: ${COMMISSIONS_AUTH0_AUDIENCE}
      Auth0__ClientId: ${COMMISSIONS_AUTH0_CLIENT_ID:-}
      Auth0__ClientSecret: ${COMMISSIONS_AUTH0_CLIENT_SECRET:-}
      # Payments / notifications (optional)
      Stripe__ApiKey: ${COMMISSIONS_STRIPE_API_KEY:-}
      Stripe__WebHookSecret: ${COMMISSIONS_STRIPE_WEBHOOK_SECRET:-}
      Novu__ApiKey: ${COMMISSIONS_NOVU_API_KEY:-}
      # Wiring
      UI__BaseUrl: ${PUBLIC_SCHEME:-https}://${COMMISSIONS_UI_HOST}
      Cors__AllowedOrigins: ${PUBLIC_SCHEME:-https}://${COMMISSIONS_UI_HOST}
    expose:
      - "8080"

  commissions-ui:
    image: ${COMMISSIONS_UI_IMAGE:-ghcr.io/d4m13n-d3v/comissions-app-ui:latest}
    platform: linux/amd64
    restart: unless-stopped
    profiles: [commissions]
    depends_on:
      - commissions-core-api
    environment:
      AUTH0_ISSUER_BASE_URL: ${COMMISSIONS_AUTH0_ISSUER_BASE_URL}
      AUTH0_CLIENT_ID: ${COMMISSIONS_AUTH0_CLIENT_ID}
      AUTH0_CLIENT_SECRET: ${COMMISSIONS_AUTH0_CLIENT_SECRET}
      AUTH0_BASE_URL: ${PUBLIC_SCHEME:-https}://${COMMISSIONS_UI_HOST}
      AUTH0_SECRET: ${COMMISSIONS_AUTH0_SECRET}
      AUTH0_AUDIENCE: ${COMMISSIONS_AUTH0_AUDIENCE}
      AUTH0_SCOPE: ${COMMISSIONS_AUTH0_SCOPE:-openid profile email}
      # Both server-side (lib/apiProxy.ts, services/*) and client-side bundle reads
      # of NEXT_PUBLIC_API_URL are honoured at runtime: the image bakes a placeholder
      # URL at build time and its docker-entrypoint.sh rewrites it to this value on
      # startup. So COMMISSIONS_API_HOST is now freely overridable here — no need to
      # match a build-time origin. (Requires the rebuilt UI image.)
      NEXT_PUBLIC_API_URL: ${PUBLIC_SCHEME:-https}://${COMMISSIONS_API_HOST}
    expose:
      - "3000"
