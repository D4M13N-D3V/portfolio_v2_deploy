# portfolio-deploy — single-host Docker Compose platform for d4m13n.dev + demos.
#
# This root file is just an aggregator. Each app and each piece of shared
# infrastructure lives in its own Compose file and is pulled in via `include:`.
# Everything merges into ONE project on ONE network, so services reach each
# other by name (caddy -> mb-api:15567, commissions-core-api -> pg:5432, ...).
#
# Which apps actually run is controlled by COMPOSE_PROFILES in .env:
#   portfolio | mechanicbuddy | commissions
# Caddy (the reverse proxy) and nothing else is always-on.
#
# To add a new app later: drop apps/<name>/compose.yaml, add it to `include:`,
# add a caddy/site-templates/<name>.caddy, and add `<name>` to COMPOSE_PROFILES.

name: portfolio-deploy

include:
  - infra/postgres/compose.yaml
  - infra/caddy/compose.yaml
  - apps/portfolio/compose.yaml
  - apps/mechanicbuddy/compose.yaml
  - apps/commissions/compose.yaml
